name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zuna-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xvfb \
            rpm \
            fakeroot \
            dpkg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Make (DEB + RPM + ZIP)
        run: npm run make
        env:
          DISPLAY: ":99"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zuna-app/out/make/**/*.deb
            zuna-app/out/make/**/*.rpm
            zuna-app/out/make/**/*.zip

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: zuna-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Make (Squirrel)
        run: npm run make

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zuna-app/out/make/**/*.exe
            zuna-app/out/make/**/*.nupkg

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: zuna-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Make (ZIP)
        run: npm run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zuna-app/out/make/**/*.zip
